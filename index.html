<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cek Rekening & E-Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4f8fff;
    --accent2: #38f5b0;
    --danger: #ff5c5c;
    --text: #e8ecf4;
    --muted: #6b7592;
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,143,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,143,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .wrapper {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(79,143,255,0.1);
    border: 1px solid rgba(79,143,255,0.25);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .header h1 { font-size: 1.9rem; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--muted); font-size: 0.88rem; margin-top: 0.5rem; font-weight: 300; }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }

  .tab-btn {
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(79,143,255,0.35);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    position: relative;
  }

  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.5rem; }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.95rem;
    outline: none;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result { margin-top: 1.5rem; border-radius: 14px; display: none; }
  .result.show { display: block; }

  .result-header { padding: 10px 16px; font-size: 0.72rem; font-weight: 600; border-radius: 14px 14px 0 0; }
  .result.success .result-header { background: rgba(56,245,176,0.1); color: var(--accent2); }
  .result.error .result-header { background: rgba(255,92,92,0.1); color: var(--danger); }

  .result-body {
    padding: 1.25rem 1.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
  }

  .result-name { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.75rem; }
  .result-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .meta-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; }
  .meta-value { font-family: var(--mono); font-size: 0.85rem; }

  .footer-note { text-align: center; margin-top: 1.5rem; font-size: 0.72rem; color: var(--muted); }
  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="badge"><span>●</span> Security Verified <span>●</span></div>
    <h1>Cek <span>Rekening</span> &amp;<br/>E-Wallet</h1>
    <p>Pastikan data benar sebelum transfer</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('bank')">🏦 Bank</button>
    <button class="tab-btn" onclick="switchTab('ewallet')">📱 E-Wallet</button>
  </div>

  <div class="panel active" id="panel-bank">
    <div class="card">
      <div class="field">
        <label>Pilih Bank</label>
        <select id="bank-select">
          <option value="">-- Pilih Bank --</option>
          <option value="bank_bca">BCA</option>
          <option value="bank_bni">BNI</option>
          <option value="bank_bri">BRI</option>
          <option value="bank_mandiri">MANDIRI</option>
          <option value="bank_bsm">BSI</option>
          <option value="bank_kesejahteraan_ekonomi">SEABANK</option>
          <option value="bank_artos">BANK JAGO</option>
          <option value="bank_royal">BCA DIGITAL (BLU)</option>
        </select>
      </div>
      <div class="field">
        <label>Nomor Rekening</label>
        <input type="text" id="bank-number" placeholder="Contoh: 12345678" inputmode="numeric" />
      </div>
      <button class="btn" id="btn-bank" onclick="checkBank()">
        <span id="btn-bank-text">🔍 Cek Rekening</span>
      </button>
    </div>
    <div class="result" id="result-bank"></div>
  </div>

  <div class="panel" id="panel-ewallet">
    <div class="card">
      <div class="field">
        <label>Pilih E-Wallet</label>
        <select id="ew-select">
          <option value="">-- Pilih E-Wallet --</option>
          <option value="wallet_dana">DANA</option>
          <option value="wallet_ovo">OVO</option>
          <option value="gopay_user">GOPAY</option>
          <option value="wallet_shopeepay">SHOPEEPAY</option>
        </select>
      </div>
      <div class="field">
        <label>Nomor HP</label>
        <input type="text" id="ew-number" placeholder="Contoh: 0812345678" inputmode="numeric" />
      </div>
      <button class="btn" id="btn-ew" onclick="checkEwallet()">
        <span id="btn-ew-text">🔍 Cek E-Wallet</span>
      </button>
    </div>
    <div class="result" id="result-ew"></div>
  </div>

  <p class="footer-note">Data real-time dari sistem perbankan</p>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'bank') || (i === 1 && tab === 'ewallet'));
    });
    document.getElementById('panel-bank').classList.toggle('active', tab === 'bank');
    document.getElementById('panel-ewallet').classList.toggle('active', tab === 'ewallet');
  }

  function setLoading(btnId, textId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    document.getElementById(textId).innerHTML = loading ? '<span class="spinner"></span>' : label;
  }

  function showResult(id, type, data) {
    const el = document.getElementById(id);
    if (type === 'success') {
      el.className = 'result show success';
      el.innerHTML = `
        <div class="result-header">✅ VERIFIKASI BERHASIL</div>
        <div class="result-body">
          <div class="result-name">${data.customer_name || data.account_name}</div>
          <div class="result-meta">
            <div><div class="meta-label">Nomor</div><div class="meta-value">${data.account_number || data.phone_number}</div></div>
            <div><div class="meta-label">Bank/Wallet</div><div class="meta-value">${data.bank_name || data.ewallet_name}</div></div>
          </div>
        </div>`;
    } else {
      el.className = 'result show error';
      el.innerHTML = `<div class="result-header">❌ GAGAL</div><div class="result-body">${data}</div>`;
    }
  }

  async function checkBank() {
    const bank = document.getElementById('bank-select').value;
    const number = document.getElementById('bank-number').value.trim();
    if (!bank || !number) return alert('Lengkapi data!');

    setLoading('btn-bank', 'btn-bank-text', true);
    try {
      const res = await fetch('/api/check-rekening', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ account_number: number, bank_code: bank })
      });
      const json = await res.json();
      if (json.status === 'success') showResult('result-bank', 'success', json.data);
      else showResult('result-bank', 'error', json.message || 'Gagal mengecek data.');
    } catch (e) {
      showResult('result-bank', 'error', 'Server sedang sibuk.');
    } finally {
      setLoading('btn-bank', 'btn-bank-text', false, '🔍 Cek Rekening');
    }
  }

  async function checkEwallet() {
    const wallet = document.getElementById('ew-select').value;
    const number = document.getElementById('ew-number').value.trim();
    if (!wallet || !number) return alert('Lengkapi data!');

    setLoading('btn-ew', 'btn-ew-text', true);
    try {
      const res = await fetch('/api/check-ewallet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone_number: number, wallet_code: wallet })
      });
      const json = await res.json();
      if (json.status === 'success') showResult('result-ew', 'success', json.data);
      else showResult('result-ew', 'error', json.message || 'Gagal mengecek data.');
    } catch (e) {
      showResult('result-ew', 'error', 'Server sedang sibuk.');
    } finally {
      setLoading('btn-ew', 'btn-ew-text', false, '🔍 Cek E-Wallet');
    }
  }
</script>
</body>
</html>
